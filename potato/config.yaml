annotation_task_name: "HINDI_FINAL_FIX_V8" # Incremented version to clear database cache
task_dir: "."
output_annotation_dir: "annotation_output/"
layout_id: "layout_html"

data_files:
  - "potato_word_align.jsonl"

item_properties:
  id_key: "id"
  text_key: "hindi_sentence"
  context_key: "english_sentence"
  # These settings tell Potato to use your pre-defined alignments rather than raw text
  is_tokenized: true
  token_key: "token_alignments"
  kwargs:
    - "hindi_sentence"
    - "english_sentence"
    - "token_alignments"

task_layout: "layout.html"

annotation_schemes:
  - annotation_type: "multiselect"
    name: "submit_check"
    description: "Submit"
    displayed: false
    labels:
      - "done"
