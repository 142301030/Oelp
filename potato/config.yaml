annotation_task_name: "hindi_alignment_v2"
task_dir: "."
output_annotation_dir: "annotation_output/"
data_files:
  - "data.jsonl"

item_properties:
  id_key: "id"
  text_key: "hindi_text"

instance_display:
  fields:
    - key: "hindi_text"
      label: "Hindi Sentence"
      type: "text"
# Update this section in your config.yaml
html_layout: |
  <div style="padding: 10px; font-family: sans-serif;">
    <div style="background: #f0f4f8; padding: 15px; border-radius: 5px;">
      <h3 style="margin:0; color:#555;">Source Hindi:</h3>
      <p style="font-size: 1.5em; font-weight: bold;">{{hindi_text}}</p>
      <small>Model Confidence: {{best_score}}</small>
    </div>
  </div>
annotation_schemes:
  - annotation_type: "radio"
    name: "alignment_choice"
    description: "Select the most accurate English translation from LaBSE:"
    labels:
      - "{{choice_1}}"
      - "{{choice_2}}"
      - "{{choice_3}}"
      - "No correct alignment"
